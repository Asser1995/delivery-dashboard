<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>مركز المتابعة — اختر المنصة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#070809;--card:#101319;--brd:#1e2530;--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#5b6675;
--hunger:#f97316;--keeta:#eab308}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 25% 30%,rgba(249,115,22,.10),transparent),
  radial-gradient(ellipse 60% 50% at 75% 70%,rgba(234,179,8,.10),transparent),
  linear-gradient(rgba(148,163,184,.015)1px,transparent 1px),
  linear-gradient(90deg,rgba(148,163,184,.015)1px,transparent 1px);
  background-size:100%,100%,46px 46px,46px 46px}
.wrap{position:relative;z-index:1;width:100%;max-width:900px;text-align:center}
.brand{margin-bottom:8px;font-size:13px;color:var(--txt3);letter-spacing:3px;font-weight:600;
  opacity:0;animation:fade .6s ease forwards}
.title{font-size:clamp(28px,5vw,46px);font-weight:900;margin-bottom:10px;line-height:1.1;
  opacity:0;animation:fade .6s ease .1s forwards}
.title .o{color:var(--hunger)}.title .y{color:var(--keeta)}
.sub{font-size:14px;color:var(--txt2);margin-bottom:44px;opacity:0;animation:fade .6s ease .2s forwards}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:680px){.cards{grid-template-columns:1fr}}
.pcard{position:relative;background:var(--card);border:1px solid var(--brd);border-radius:20px;
  padding:36px 28px;cursor:pointer;transition:.35s cubic-bezier(.2,.8,.2,1);overflow:hidden;
  text-decoration:none;color:inherit;opacity:0;animation:rise .7s cubic-bezier(.2,.8,.2,1) forwards}
.pcard:nth-child(1){animation-delay:.3s}.pcard:nth-child(2){animation-delay:.42s}
.pcard::before{content:'';position:absolute;inset:0;opacity:0;transition:.35s;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,var(--glow),transparent)}
.pcard:hover{transform:translateY(-8px);border-color:var(--ac)}
.pcard:hover::before{opacity:.18}
.pcard:hover .ic{transform:scale(1.1) rotate(-5deg)}
.pcard:hover .go{gap:14px;color:var(--ac)}
.ic{width:78px;height:78px;border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:38px;margin:0 auto 20px;transition:.35s;position:relative;z-index:1}
.hunger .ic{background:linear-gradient(135deg,rgba(249,115,22,.2),rgba(249,115,22,.05));
  border:1px solid rgba(249,115,22,.3);box-shadow:0 0 40px rgba(249,115,22,.15)}
.keeta .ic{background:linear-gradient(135deg,rgba(234,179,8,.2),rgba(234,179,8,.05));
  border:1px solid rgba(234,179,8,.3);box-shadow:0 0 40px rgba(234,179,8,.15)}
.pname{font-size:26px;font-weight:900;margin-bottom:6px;position:relative;z-index:1}
.pdesc{font-size:12px;color:var(--txt3);margin-bottom:22px;position:relative;z-index:1}
.stats{display:flex;justify-content:center;gap:26px;margin-bottom:24px;position:relative;z-index:1}
.stat{text-align:center}
.stat-v{font-size:24px;font-weight:900;color:var(--ac)}
.stat-l{font-size:10px;color:var(--txt3);margin-top:2px}
.go{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;
  color:var(--txt2);transition:.3s;position:relative;z-index:1}
.hunger{--ac:var(--hunger);--glow:rgba(249,115,22,1)}
.keeta{--ac:var(--keeta);--glow:rgba(234,179,8,1)}
.foot{margin-top:38px;font-size:11px;color:var(--txt3);opacity:0;animation:fade .6s ease .6s forwards}
.live{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;
  animation:pulse 2s infinite;margin-left:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fade{to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">DELIVERY OPERATIONS</div>
  <div class="title">مركز <span class="o">المتابعة</span> <span class="y">الحية</span></div>
  <div class="sub">اختر المنصة لعرض لوحة متابعة الأداء<span class="live"></span></div>
  <div class="cards">
    <a class="pcard hunger" href="hunger_dashboard_v2.html">
      <div class="ic">🍔</div>
      <div class="pname">هنقر</div>
      <div class="pdesc">HungerStation — متابعة الأداء والأهداف</div>
      <div class="stats">
        <div class="stat"><div class="stat-v">149</div><div class="stat-l">سائق</div></div>
        <div class="stat"><div class="stat-v">44,430</div><div class="stat-l">طلب</div></div>
      </div>
      <div class="go">دخول <span>←</span></div>
    </a>
    <a class="pcard keeta" href="keeta_dashboard.html">
      <div class="ic">🟡</div>
      <div class="pname">كيتا</div>
      <div class="pdesc">Keeta — متابعة الصلاحية والطلبات</div>
      <div class="stats">
        <div class="stat"><div class="stat-v">44</div><div class="stat-l">سائق</div></div>
        <div class="stat"><div class="stat-v">42</div><div class="stat-l">صالح</div></div>
      </div>
      <div class="go">دخول <span>←</span></div>
    </a>
  </div>
  <div class="foot">📅 آخر تحديث: 26/05/2026 — البيانات من Google Drive</div>
</div>
</body>
</html>
